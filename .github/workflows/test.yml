name: Run Monorepo Services with Public URL

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-services:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Containers
        run: |
          docker compose up -d --build

      - name: Wait for Containers
        run: sleep 20

      - name: Show Running Containers
        run: docker ps

      - name: Test Frontend Locally
        run: curl http://localhost:3000

      - name: Install Cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url http://localhost:3000 > tunnel.log 2>&1 &
          sleep 15

      - name: Show Public URL
        run: |
          cat tunnel.log

      - name: Keep Workflow Alive for Testing
        run: |
          echo "Application is live for temporary testing..."
          sleep 300

      - name: Show Container Logs
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down
